[build]
  base    = "."
  publish = "apps/admin/.next"
  command = "cd apps/admin && NEXT_TELEMETRY_DISABLED=1 npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"

# Forca o Netlify a varrer e copiar arquivos do Next.js pro bundle
# Resolve o bug 'Cannot find module next/dist/server/lib/start-server.js'
[functions]
  included_files = [
    "node_modules/next/**/*",
    "apps/admin/node_modules/next/**/*"
  ]
  node_bundler = "zisi"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
