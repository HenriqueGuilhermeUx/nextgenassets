[build]
  base    = "."
  publish = "apps/partner/out"
  command = "cd apps/partner && NEXT_TELEMETRY_DISABLED=1 npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"

