# ============================================
#  DOCKER COMPOSE — Produção
# ============================================
# Roda: API + 4 Next.js apps + Postgres + Redis + Vault + Nginx

version: "3.9"

services:
  # ============ Infraestrutura ============
  postgres:
    image: postgres:16-alpine
    container_name: orkest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: orkest-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  vault:
    image: hashicorp/vault:1.15
    container_name: orkest-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/file
    networks:
      - backend

  # ============ API ============
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    container_name: orkest-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EFI_CLIENT_ID: ${EFI_CLIENT_ID}
      EFI_CLIENT_SECRET: ${EFI_CLIENT_SECRET}
      WOOVI_APP_ID: ${WOOVI_APP_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============ Frontends ============
  marketing:
    build:
      context: ..
      dockerfile: deploy/docker/nextjs.Dockerfile
      args:
        APP_PATH: apps/marketing
        APP_PORT: 3000
    container_name: orkest-marketing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    networks:
      - backend
      - frontend

  admin:
    build:
      context: ..
      dockerfile: deploy/docker/nextjs.Dockerfile
      args:
        APP_PATH: apps/admin
        APP_PORT: 3002
    container_name: orkest-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    networks:
      - backend
      - frontend

  partner:
    build:
      context: ..
      dockerfile: deploy/docker/nextjs.Dockerfile
      args:
        APP_PATH: apps/partner
        APP_PORT: 3003
    container_name: orkest-partner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    networks:
      - backend
      - frontend

  consumer:
    build:
      context: ..
      dockerfile: deploy/docker/nextjs.Dockerfile
      args:
        APP_PATH: apps/consumer
        APP_PORT: 3004
    container_name: orkest-consumer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    networks:
      - backend
      - frontend

  # ============ Reverse Proxy ============
  nginx:
    image: nginx:1.25-alpine
    container_name: orkest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - marketing
      - admin
      - partner
      - consumer
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:
  vault_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
