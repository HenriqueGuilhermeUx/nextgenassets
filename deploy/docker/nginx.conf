# ============================================
#  NGINX — Reverse proxy + SSL termination
# ============================================

events { worker_connections 1024; }

http {
  upstream api        { server api:3001; }
  upstream marketing  { server marketing:3000; }
  upstream admin      { server admin:3002; }
  upstream partner    { server partner:3003; }
  upstream consumer   { server consumer:3004; }

  # Rate limiting zone
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=webhooks_limit:10m rate=1000r/s;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Compressão
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # ========== Domínio público ==========
  server {
    listen 80;
    server_name orkest.com.br www.orkest.com.br;
    return 301 https://orkest.com.br$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name orkest.com.br www.orkest.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Site público
    location / {
      proxy_pass http://marketing;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ========== Admin (restrito) ==========
  server {
    listen 443 ssl http2;
    server_name admin.orkest.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # IP whitelist (atualizar em produção)
    # allow 203.0.113.0/24;
    # deny all;

    location / {
      proxy_pass http://admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # ========== Partner Portal ==========
  server {
    listen 443 ssl http2;
    server_name partners.orkest.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      proxy_pass http://partner;
      proxy_set_header Host $host;
    }
  }

  # ========== Consumer Portal ==========
  server {
    listen 443 ssl http2;
    server_name app.orkest.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      proxy_pass http://consumer;
      proxy_set_header Host $host;
    }
  }

  # ========== API ==========
  server {
    listen 443 ssl http2;
    server_name api.orkest.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Rate limit
    limit_req zone=api_limit burst=20 nodelay;

    location /v1/webhooks/ {
      # Webhooks precisam de rate maior
      limit_req zone=webhooks_limit burst=100 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;  # Webhooks podem demorar
    }

    location / {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
