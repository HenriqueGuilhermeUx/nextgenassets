# Orkest API — Deployment + Service + HPA + Ingress
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orkest-api
  namespace: orkest
  labels:
    app: orkest-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orkest-api
  template:
    metadata:
      labels:
        app: orkest-api
    spec:
      containers:
      - name: api
        image: ghcr.io/orkest/api:v2.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: DATABASE_URL } }
        - name: REDIS_URL
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: REDIS_URL } }
        - name: VAULT_TOKEN
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: VAULT_TOKEN } }
        - name: OPENAI_API_KEY
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: OPENAI_API_KEY } }
        - name: EFI_CLIENT_ID
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: EFI_CLIENT_ID } }
        - name: EFI_CLIENT_SECRET
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: EFI_CLIENT_SECRET } }
        - name: WOOVI_APP_ID
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: WOOVI_APP_ID } }
        - name: SHOPIFY_ADMIN_ACCESS_TOKEN
          valueFrom: { secretKeyRef: { name: orkest-secrets, key: SHOPIFY_ADMIN_ACCESS_TOKEN } }
        resources:
          requests: { cpu: 250m, memory: 512Mi }
          limits:   { cpu: 1,    memory: 1Gi }
        livenessProbe:
          httpGet: { path: /v1/health, port: 3001 }
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet: { path: /v1/health, port: 3001 }
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orkest-api
  namespace: orkest
spec:
  selector:
    app: orkest-api
  ports:
  - port: 80
    targetPort: 3001
  type: ClusterIP
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orkest-api-hpa
  namespace: orkest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orkest-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: { type: Utilization, averageUtilization: 70 }
  - type: Resource
    resource:
      name: memory
      target: { type: Utilization, averageUtilization: 80 }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orkest-api-ingress
  namespace: orkest
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts: [api.orkest.com.br]
    secretName: orkest-api-tls
  rules:
  - host: api.orkest.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: orkest-api, port: { number: 80 } }
